    <div id="root"></div>

    <button id="themeToggleBtn" title="Toggle light / dark theme"><span class="toggle-icon">☾</span><span class="toggle-label">Dark Mode</span></button>
    <script>
      (function() {
        var btn = document.getElementById('themeToggleBtn');
        function applyTheme(isDark) {
          if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.classList.add('dark');
            btn.querySelector('.toggle-label').textContent = 'Light Mode';
          } else {
            document.documentElement.removeAttribute('data-theme');
            document.documentElement.classList.remove('dark');
            btn.querySelector('.toggle-label').textContent = 'Dark Mode';
          }
          localStorage.setItem('case-study-theme', isDark ? 'dark' : 'light');
        }
        var saved = localStorage.getItem('case-study-theme');
        if (saved === 'dark') applyTheme(true);
        if (btn) {
          btn.addEventListener('click', function() {
            var dark = document.documentElement.getAttribute('data-theme') === 'dark';
            applyTheme(!dark);
          });
        }
      })();
    </script>
    <script>
      (function() {
        function applyPrismaticLogo() {
          var logo = document.querySelector('h1 > span.relative.inline-block');

          logo.classList.add('prismatic-text');
          var underline = logo.querySelector('span.absolute');
          if (underline) underline.classList.add('prismatic-underline');
          return true;
        }
        var attempts = 0;
        var interval = setInterval(function() {
          if (applyPrismaticLogo() || attempts++ > 10) {
            clearInterval(interval);

        document.addEventListener('DOMContentLoaded', function() {

    <!-- Aurora grid script (adapted from grid.html; reduced cells and hero-mouse mapped hover) -->
    <script>
      (function(){
        function initAurora() {
          const hero = document.querySelector('section#hero') || document.querySelector('#root section#hero');
          if(hero) {
            attachAurora(hero);
            return true;
          }
          return false;
        }

        function attachAurora(hero) {
          if (hero.dataset.auroraAttached) return;
          hero.dataset.auroraAttached = '1';

          const COLOR_INTERVAL = 80;
          const MATTE = '#000000';

          // create scene container and insert as first child so it's behind content
          const scene = document.createElement('div');
          scene.className = 'aurora-scene';
          scene.style.position = 'absolute';
          scene.style.inset = '0';
          scene.style.zIndex = '0';
          scene.style.pointerEvents = 'none';
          if (!hero.style.position || hero.style.position === 'static') {
            hero.style.position = 'relative';
          }
          hero.insertBefore(scene, hero.firstChild);

          const panel = document.createElement('div');
          panel.className = 'aurora-panel';
          panel.style.position = 'absolute';
          panel.style.inset = '0';
          panel.style.zIndex = '0';

          const auroraBg = document.createElement('div');
          auroraBg.className = 'aurora-bg';

          const grid = document.createElement('div');
          grid.className = 'aurora-grid';

          panel.appendChild(auroraBg);
          panel.appendChild(grid);
          scene.appendChild(panel);

          // Configuration: 8x4 grid with larger cube coverage and low render cost
          const cols = 8, rows = 4;
          grid.style.gridTemplateColumns = `repeat(${cols},1fr)`;
          grid.style.gridTemplateRows    = `repeat(${rows},1fr)`;

          const cellEls = [];
          const cellMeta = [];
          for(let i = 0; i < cols * rows; i++){
            const cell = document.createElement('div');
            cell.className = 'aurora-cell';
            cell.innerHTML = `<div class="aurora-box">
              <div class="aurora-face top"></div>
              <div class="aurora-face back"></div>
              <div class="aurora-face left"></div>
              <div class="aurora-face right"></div>
            </div>`;
            grid.appendChild(cell);
            cellEls.push(cell);
            cellMeta.push({
              col: i % cols,
              row: Math.floor(i / cols),
              top: cell.querySelector('.aurora-face.top'),
              back: cell.querySelector('.aurora-face.back'),
              left: cell.querySelector('.aurora-face.left'),
              right: cell.querySelector('.aurora-face.right'),
              inTrap: false,
            });
          }

          const offscreen = document.createElement('canvas');
          let offCtx, W, H, currentHue = 0, lastColorUpdate = 0;

          function getTrap() {
            const trapF = [[0.12,0.10],[1.00,0.06],[1.00,0.88],[0.28,0.88]];
            return trapF.map(([fx,fy])=>[fx*W, fy*H]);
          }

          function pointInTrap(px, py) {
            const poly = getTrap();
            let inside = false;
            for(let i=0,j=poly.length-1;i<poly.length;j=i++){
              const [xi,yi]=poly[i],[xj,yj]=poly[j];
              if(((yi>py)!=(yj>py))&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
            }
            return inside;
          }

          function cellTouchesTrap(col, row, cW, cH) {
            const x0=col*cW, y0=row*cH, x1=x0+cW, y1=y0+cH;
            return pointInTrap((x0+x1)/2,(y0+y1)/2)
              || pointInTrap(x0+2,y0+2) || pointInTrap(x1-2,y0+2)
              || pointInTrap(x0+2,y1-2) || pointInTrap(x1-2,y1-2);
          }

          function recomputeTrapMembership() {
            const cW = W / cols, cH = H / rows;
            cellMeta.forEach((meta) => {
              meta.inTrap = cellTouchesTrap(meta.col, meta.row, cW, cH);
            });
          }

          function drawAurora(t) {
            offCtx.clearRect(0,0,W,H);
            const p = t * 0.00035;
            const h1 = (p * 40) % 360;
            currentHue = h1;
            const poly = getTrap();
            offCtx.save();
            offCtx.beginPath();
            offCtx.moveTo(poly[0][0], poly[0][1]);
            for(let i=1;i<poly.length;i++) offCtx.lineTo(poly[i][0], poly[i][1]);
            offCtx.closePath();
            offCtx.clip();

            const gradient = offCtx.createLinearGradient(0, 0, W, 0);
            gradient.addColorStop(0, `hsla(${h1}, 80%, 55%, 0.85)`);
            gradient.addColorStop(0.55, `hsla(${(h1 + 30) % 360}, 85%, 65%, 0.6)`);
            gradient.addColorStop(1, `hsla(${(h1 + 60) % 360}, 80%, 72%, 0.35)`);
            offCtx.fillStyle = gradient;
            offCtx.fillRect(0,0,W,H);
            offCtx.restore();
          }

          function applyMatteFaces() {
            cellMeta.forEach((meta) => {
              meta.back.style.background = MATTE;
              meta.left.style.background = MATTE;
              meta.right.style.background = MATTE;
              if (!meta.inTrap) {
                meta.top.style.backgroundImage = '';
                meta.top.style.background = MATTE;
              }
            });
          }

          function applyColors(force) {
            if (!offCtx || !W || !H) return;
            const url = offscreen.toDataURL('image/jpeg', 0.82);
            auroraBg.style.backgroundImage = `url(${url})`;
            auroraBg.style.backgroundSize = `${W}px ${H}px`;
            const cW = W / cols, cH = H / rows;
            cellMeta.forEach((meta) => {
              const { top, col, row, inTrap } = meta;
              if (inTrap) {
                top.style.backgroundImage = `url(${url})`;
                top.style.backgroundSize = `${W}px ${H}px`;
                top.style.backgroundPosition = `-${Math.round(col * cW)}px -${Math.round(row * cH)}px`;
                top.style.backgroundRepeat = 'no-repeat';
                top.style.backgroundColor = MATTE;
              }
            });
            applyMatteFaces();
          }

          let auroraActive = true;
          let dropTimer = null;

          function resize() {
            W = panel.offsetWidth;
            H = panel.offsetHeight;
            if (W <= 0 || H <= 0) return false;
            offscreen.width = W;
            offscreen.height = H;
            recomputeTrapMembership();
            applyMatteFaces();
            return true;
          }

          function paintAurora(t, force) {
            if (!offCtx || !W || !H) return;
            drawAurora(t);
            applyColors(force);
          }

          function loop(t) {
            if (auroraActive) {
              if (!W || !H) resize();
              if (auroraActive && t - lastColorUpdate >= COLOR_INTERVAL) {
                lastColorUpdate = t;
                paintAurora(t, false);
              }
            }
            requestAnimationFrame(loop);
          }

          function activateAurora() {
            auroraActive = true;
            scene.style.display = '';
            lastColorUpdate = 0;
            if (resize()) paintAurora(performance.now(), true);
            startRandomDrops();
          }

          function deactivateAurora() {
            if (!auroraActive) return;
            auroraActive = false;
            scene.style.display = 'none';
            if (dropTimer !== null) {
              clearInterval(dropTimer);
              dropTimer = null;
            }
            cellEls.forEach(cell => cell.classList.remove('pressed'));
          }

          offCtx = offscreen.getContext('2d', { willReadFrequently: true });
          lastColorUpdate = 0;
          if (resize()) paintAurora(performance.now(), true);
          requestAnimationFrame(loop);
          window.addEventListener('resize', function() {
            if (resize()) paintAurora(performance.now(), true);
          });
          [100, 400, 1000].forEach(function(delay) {
            setTimeout(function() {
              if (resize()) paintAurora(performance.now(), true);
            }, delay);
          });

          let hasBeenVisible = false;
          const observer = new IntersectionObserver(entries => {
            const entry = entries[0];
            if (entry && entry.isIntersecting) {
              hasBeenVisible = true;
              activateAurora();
            } else if (hasBeenVisible) {
              deactivateAurora();
            }
          }, {
            root: null,
            threshold: 0.05
          });

          observer.observe(hero);

          // Random drop animation for cubes with slower timing and gentle stagger
          const activeDrops = new Set();
          const dropDuration = 1300;
          const dropInterval = 400;
          const maxStagger = 240;

          function startRandomDrops() {
            if (dropTimer !== null) return;
            dropTimer = setInterval(() => {
              const dropCount = Math.random() < 0.45 ? 2 : 1;
              for (let n = 0; n < dropCount; n++) {
                const idx = Math.floor(Math.random() * cellEls.length);
                const cell = cellEls[idx];
                if (!cell || activeDrops.has(idx)) continue;
                activeDrops.add(idx);
                const delay = Math.round(Math.random() * maxStagger);
                setTimeout(() => {
                  cell.classList.add('pressed');
                  setTimeout(() => {
                    cell.classList.remove('pressed');
                    activeDrops.delete(idx);
                  }, dropDuration);
                }, delay);
              }
            }, dropInterval);
          }

          startRandomDrops();
        }

        function startAurora() {
          if(initAurora()) return;
          const observer = new MutationObserver((mutations, obs) => {
            if(initAurora()) {
              obs.disconnect();
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
          setTimeout(() => observer.disconnect(), 8000);
        }

        if(document.readyState === 'complete' || document.readyState === 'interactive') startAurora();
        else document.addEventListener('DOMContentLoaded', startAurora);
      })();
    </script>
<script>
  (function() {
    function removeThirdJourneyCard() {
      const cards = document.querySelectorAll('section#journey .scroll-snap-start');
      if (cards.length >= 3) {
        cards[2].remove();
        return true;
      }
      return false;
    }

    function injectIterationImage(card, src, alt) {
      if (!card || card.querySelector('img.iteration-card-image')) return false;
      const img = document.createElement('img');
      img.src = src;
      img.alt = alt;
      img.className = 'iteration-card-image';
      img.style.display = 'block';
      img.style.width = '100%';
      img.style.maxWidth = '260px';
      img.style.margin = '16px auto 0';
      img.style.borderRadius = '18px';
      const insertBefore = card.querySelector('.mt-4');
      const wrapper = card.querySelector('.text-center');
      if (wrapper) {
        if (insertBefore) wrapper.insertBefore(img, insertBefore);
        else wrapper.appendChild(img);
        return true;
      }
      return false;
    }

    function removeCardLabel(card) {
      if (!card) return false;
      const label = card.querySelector('.text-sm');
      if (label) {
        label.remove();
        return true;
      }
      return false;
    }

    function processJourneyCards() {
      const cards = document.querySelectorAll('section#journey .scroll-snap-start');
      let changed = false;
      if (cards.length >= 3) {
        cards[2].remove();
        changed = true;
      }
      if (cards.length >= 1) {
        changed = removeCardLabel(cards[0]) || changed;
        changed = injectIterationImage(cards[0], 'iterationuno.png', 'Iteration 1 preview') || changed;
      }
      if (cards.length >= 2) {
        changed = removeCardLabel(cards[1]) || changed;
        changed = injectIterationImage(cards[1], 'iterationdos.png', 'Iteration 2 preview') || changed;
      }
      return changed;
    }

    const observer = new MutationObserver(function() {
      if (processJourneyCards()) {
        observer.disconnect();
      }
    });

    observer.observe(document.body, { childList: true, subtree: true });
    processJourneyCards();
    setTimeout(() => observer.disconnect(), 10000);
  })();
</script>
