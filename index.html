    <style>
      .hero-gradient { background: linear-gradient(135deg,#1e1b4b,#312e81,#4338ca) !important; }
      .hero-section-inner { max-width: 82rem !important; }
      @media (max-width: 639px) {
        main > section:first-of-type { padding-left: 0 !important; padding-right: 0 !important; }
        .hero-section-inner {
          max-width: 100vw !important;
          width: 100vw !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
          border-radius: 0 !important;
        }
        main > section:first-of-type > * {
          margin-left: 0 !important;
          margin-right: 0 !important;
        }
      }
      body { background-color: #f8f7ff !important; }
      nav, header { background-color: #ffffff !important; border-bottom-color: #e0e7ff !important; }
      .text-zinc-900, h1, h2, h3 { color: #1e1b4b !important; }
      .text-zinc-600, .text-zinc-500 { color: #4c4a6d !important; }
      .text-zinc-400 { color: #7c7aaa !important; }
      .bg-zinc-50, .bg-zinc-100 { background-color: #ede9fe !important; }
      .border-zinc-200, .border-zinc-100 { border-color: #c7d2fe !important; }
      [class*="bg-zinc-900"] { background-color: #4338ca !important; color: #ffffff !important; }
      .link-underline::after { background-color: #f59e0b !important; }
      .bg-white { background-color: #ffffff !important; box-shadow: 0 2px 16px 0 rgba(67,56,202,.07) !important; }
      footer { background-color: #1e1b4b !important; color: #e0e7ff !important; border-top-color: #312e81 !important; }
      footer .text-zinc-600, footer .text-zinc-500, footer .text-zinc-400 { color: #a5b4fc !important; }
      footer .text-zinc-900 { color: #e0e7ff !important; }
      footer a { color: #a5b4fc !important; }
      footer a:hover { color: #f59e0b !important; }
      [class*="rounded-full"][class*="bg-zinc"] { background-color: #ede9fe !important; color: #4338ca !important; border-color: #c7d2fe !important; }
    </style>

    <!-- ===== 2026 UPGRADE STYLES ===== -->
    <style>
      /* ---- DUAL THEME: DARK MODE (Option A) ---- */
      :root { transition: background-color 0.5s ease, color 0.5s ease; }
      [data-theme="dark"] body {
        background-color: #0d0d0d !important;
        color: #f0f0f0 !important;
      }
      [data-theme="dark"] nav,
      [data-theme="dark"] header {
        background-color: rgba(13,13,13,0.85) !important;
        border-bottom-color: #222 !important;
        backdrop-filter: blur(16px) !important;
      }
      [data-theme="dark"] .text-zinc-900,
      [data-theme="dark"] h1,
      [data-theme="dark"] h2,
      [data-theme="dark"] h3 {
        color: #f5f5f5 !important;
      }
      [data-theme="dark"] .text-zinc-600,
      [data-theme="dark"] .text-zinc-500 {
        color: #999 !important;
      }
      [data-theme="dark"] .text-zinc-400 {
        color: #666 !important;
      }
      [data-theme="dark"] .bg-zinc-50,
      [data-theme="dark"] .bg-zinc-100,
      [data-theme="dark"] .bg-white {
        background-color: #161616 !important;
        box-shadow: 0 2px 20px rgba(0,0,0,0.6) !important;
      }
      [data-theme="dark"] .border-zinc-200,
      [data-theme="dark"] .border-zinc-100,
      [data-theme="dark"] .border-zinc-300 {
        border-color: #2a2a2a !important;
      }
      [data-theme="dark"] footer {
        background-color: #050505 !important;
        border-top-color: #1a1a1a !important;
        color: #aaa !important;
      }
      [data-theme="dark"] footer .text-zinc-600,
      [data-theme="dark"] footer .text-zinc-500,
      [data-theme="dark"] footer .text-zinc-400 { color: #777 !important; }
      [data-theme="dark"] footer .text-zinc-900 { color: #ccc !important; }
      [data-theme="dark"] footer a { color: #888 !important; }
      [data-theme="dark"] footer a:hover { color: #FF8A7A !important; }
      [data-theme="dark"] [class*="bg-zinc-900"] { background-color: #FF8A7A !important; color: #000 !important; }
      [data-theme="dark"] [class*="rounded-full"][class*="bg-zinc"] {
        background-color: #1e1e1e !important;
        color: #FF8A7A !important;
        border-color: #333 !important;
      }

      /* Ambient dark glow */
      [data-theme="dark"]::before {
        content: '';
        position: fixed;
        top: -20%;
        left: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(255, 107, 91, 0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
        animation: ambientPulse 8s ease-in-out infinite alternate;
      }
      @keyframes ambientPulse {
        from { transform: translate(0,0) scale(1); opacity: 0.6; }
        to   { transform: translate(5vw, 5vh) scale(1.1); opacity: 1; }
      }

      /* Typographic maximalism removed — original Tailwind sizes preserved */

      /* ---- ENHANCED CURSOR ---- */
      .custom-cursor {
        width: 18px;
        height: 18px;
        border: 1.5px solid #FF6B5B;
        mix-blend-mode: difference;
        transition: width 0.25s, height 0.25s, background-color 0.25s;
      }
      .custom-cursor.hover {
        width: 56px;
        height: 56px;
        background-color: rgba(255, 107, 91, 0.15);
        border-color: #FF6B5B;
      }
      [data-theme="dark"] .custom-cursor {
        border-color: #FF8A7A;
        mix-blend-mode: difference;
      }
      [data-theme="dark"] .custom-cursor-dot {
        background-color: #FF8A7A;
      }

      /* ---- THEME TOGGLE BUTTON ---- */
      #themeToggleBtn {
        position: fixed;
        bottom: 32px;
        right: 32px;
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 9999px;
        border: 1.5px solid rgba(0,0,0,0.12);
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: #111;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      #themeToggleBtn:hover {
        transform: scale(1.06) translateY(-2px);
        box-shadow: 0 8px 28px rgba(255, 107, 91, 0.25);
        border-color: #FF6B5B;
      }
      [data-theme="dark"] #themeToggleBtn {
        background: rgba(20, 20, 20, 0.8);
        border: 1.5px solid rgba(255,255,255,0.1);
        color: #f0f0f0;
        box-shadow: 0 4px 20px rgba(255, 107, 91, 0.15);
      }
      [data-theme="dark"] #themeToggleBtn:hover {
        box-shadow: 0 8px 32px rgba(255, 107, 91, 0.35);
        border-color: #FF8A7A;
      }
      #themeToggleBtn .toggle-icon {
        font-size: 1rem;
        transition: transform 0.5s ease;
      }
      [data-theme="dark"] #themeToggleBtn .toggle-icon {
        transform: rotate(180deg);
      }

      /* ---- PARALLAX PROJECT IMAGES ---- */
      .project-card {
        overflow: hidden;
      }
      .project-card img {
        will-change: transform;
        transition: transform 0.1s linear;
      }
      .project-card .aspect-\[4\/5\],
      .project-card .aspect-video {
        aspect-ratio: 16 / 9 !important;
      }
      article.project-card:not(.video-card) img[src^="data:image/"],
      article.project-card:not(.video-card) img[src=""] {
        display: none !important;
      }

      /* ---- MAGNETIC BUTTON TRANSITION ---- */
      a, button {
        transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                    box-shadow 0.3s ease,
                    color 0.4s ease,
                    background-color 0.4s ease,
                    border-color 0.4s ease !important;
      }
    </style>

    <button id="themeToggleBtn" title="Toggle light / dark theme">
      <span class="toggle-icon">&#9790;</span>
      <span class="toggle-label">Dark Mode</span>
    </button>

    <script>
      (function() {
        // ---- THEME TOGGLE ----
        var btn   = document.getElementById('themeToggleBtn');
        var label = btn ? btn.querySelector('.toggle-label') : null;

        function applyTheme(isDark) {
          if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            if (label) label.textContent = 'Light Mode';
          } else {
            document.documentElement.removeAttribute('data-theme');
            if (label) label.textContent = 'Dark Mode';
          }
          localStorage.setItem('portfolio-theme', isDark ? 'dark' : 'light');
        }

        // Restore saved preference
        var saved = localStorage.getItem('portfolio-theme');
        if (saved === 'dark') applyTheme(true);

        if (btn) {
          btn.addEventListener('click', function() {
            var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            applyTheme(!isDark);
          });
        }

        // ---- MAGNETIC BUTTON EFFECT ----
        function initMagnetic() {
          var magnets = document.querySelectorAll('button, a[class*="btn"], a[class*="rounded"]');
          magnets.forEach(function(el) {
            el.addEventListener('mousemove', function(e) {
              var rect   = el.getBoundingClientRect();
              var relX   = e.clientX - rect.left - rect.width  / 2;
              var relY   = e.clientY - rect.top  - rect.height / 2;
              var dist   = Math.hypot(relX, relY);
              var range  = Math.max(rect.width, rect.height) * 0.7;
              if (dist < range) {
                var strength = (1 - dist / range) * 0.35;
                el.style.transform = 'translate(' + (relX * strength) + 'px, ' + (relY * strength) + 'px)';
              }
            });
            el.addEventListener('mouseleave', function() {
              el.style.transform = '';
            });
          });
        }

        // ---- PARALLAX SCROLLING ----
        function initParallax() {
          var cards = document.querySelectorAll('.project-card, [class*="project"] img, [class*="card"] img');
          if (!cards.length) return;
          window.addEventListener('scroll', function() {
            var scrollY = window.pageYOffset;
            cards.forEach(function(card) {
              var rect = card.getBoundingClientRect();
              var offsetFromCenter = rect.top + rect.height / 2 - window.innerHeight / 2;
              var parallaxShift = offsetFromCenter * 0.04;
              var img = card.tagName === 'IMG' ? card : card.querySelector('img');
              if (img) img.style.transform = 'translateY(' + parallaxShift + 'px) scale(1.05)';
            });
          }, { passive: true });
        }

        // Wait for DOM ready, then initialise
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initMagnetic,  600);
            setTimeout(initParallax, 600);
          });
        } else {
          setTimeout(initMagnetic,  600);
          setTimeout(initParallax, 600);
        }
      })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function(){
  function bindStadiaCard(card){
    try{
      if(card.__strivingPatched) return;
      if(card.textContent && card.textContent.indexOf('Stadia Store Redesign') !== -1){
        card.__strivingPatched = true;
        card.style.cursor = 'pointer';
        card.addEventListener('click', function(e){
          var a = e.target.closest('a');
          if(a) return; // let internal links work
          window.location.href = 'striving-paws.html';
        });
      }
    }catch(err){console.warn(err)}
  }

  function bindRizalCard(card){
    try{
      if(card.__rizalPatched) return;
      if(card.textContent && card.textContent.indexOf('LifeWorks Rizal') !== -1){
        card.__rizalPatched = true;
        card.style.cursor = 'pointer';
        
        // Replace image with video
        var imageContainer = card.querySelector('.aspect-\\[4\\/5\\]');
        if(imageContainer){
          var img = imageContainer.querySelector('img');
          if(img){
            var video = document.createElement('video');
            video.src = 'rizal.mp4';
            video.className = 'project-card-image w-full h-full object-cover';
            video.autoplay = true;
            video.muted = true;
            video.loop = true;
            video.playsInline = true;
            img.replaceWith(video);
            card.classList.add('video-card');
          }
        }
        
        card.addEventListener('click', function(e){
          var a = e.target.closest('a');
          if(a) return; // let internal links work
          window.location.href = 'LifeWorks-Rizal/index.html';
        });
      }
    }catch(err){console.warn(err)}
  }

  document.querySelectorAll('.project-card').forEach(function(card){
    bindStadiaCard(card);
    bindRizalCard(card);
  });

  // If content is rendered dynamically, observe and bind when new cards appear
  var obs = new MutationObserver(function(){
    document.querySelectorAll('.project-card').forEach(function(card){
      bindStadiaCard(card);
      bindRizalCard(card);
    });
  });
  obs.observe(document.body, { childList: true, subtree: true });
});
</script>
